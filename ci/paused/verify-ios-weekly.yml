# PAUSED — native iOS App Store distribution deferred (ADR 005, 2026-05-17).
#
# This workflow is intentionally NOT under .github/workflows/ so GitHub Actions
# will not register any triggers. Do not move back until product re-scopes
# native iOS (Apple Developer Program / App Store).
#
# To re-enable:
#   1. Move this file to .github/workflows/verify-ios-weekly.yml
#   2. Restore the `on:` block below (schedule and/or workflow_dispatch)
#   3. Update docs/specs/adr/005-distribution-channels.md revisit gate
#
# Former schedule: Mondays 06:20 UTC (cron: '20 6 * * 1')

name: 'Verify iOS (weekly)'

# on:
#   schedule:
#     - cron: '20 6 * * 1'
#   workflow_dispatch:

concurrency:
  group: verify-ios-weekly-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.41.7'

jobs:
  client-ios:
    runs-on: macos-14
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build ios --debug --no-codesign
