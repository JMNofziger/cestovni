name: cestovni
description: "Cestovni mobile client (Flutter + Drift) — M0 bootstrap."
publish_to: 'none'
version: 0.0.1+1

# Min SDK floors per ADR 003 (Flutter + Drift stack).
environment:
  sdk: ^3.11.5
  flutter: ">=3.35.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Drift — typed SQLite DAO + MigrationStrategy per ADR 003.
  drift: ^2.20.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Drift codegen pipeline.
  drift_dev: ^2.20.0
  build_runner: ^2.4.11

  # Dart-native SQLite bundle used by unit tests (no Flutter engine).
  sqlite3: ^2.4.6

flutter:
  uses-material-design: true
