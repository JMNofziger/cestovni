# Heavier matrix: Flutter unit tests (gates android/ios) + debug APK on
# ubuntu-latest + debug iOS (no codesign) on macos-14. Runs on main pushes
# (always), PRs that touch the client or this workflow, and manual dispatch.
#
# Pair with verify-fast.yml: fast runs everywhere; full catches native-only
# breakages without burning macOS minutes on unrelated PRs.

name: 'Verify (full)'

on:
  pull_request:
    paths:
      - 'client/**'
      - '.github/workflows/verify-full.yml'
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: verify-full-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.41.7'

jobs:
  client-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter analyze
      - run: flutter test --no-pub

  client-android:
    needs: client-test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build apk --debug
      - uses: actions/upload-artifact@v4
        with:
          name: cestovni-debug-apk
          path: client/build/app/outputs/flutter-apk/app-debug.apk

  client-ios:
    needs: client-test
    runs-on: macos-14
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build ios --debug --no-codesign
