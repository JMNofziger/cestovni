# Heavier matrix: Flutter tests + debug APK (Linux) + optional iOS (macOS).
#
# Minute discipline:
# - Same triggers as fast for merges (PR + main), but PR is path-filtered to
#   client / this workflow so unrelated PRs do not run native builds.
# - iOS is skipped on push to main (PR already exercised iOS for client
#   changes; merges that skip PR are rare). Re-run iOS via workflow_dispatch
#   or verify-ios-weekly.yml if needed.
# - Caches Pub, Gradle, and Flutter SDK where supported.

name: 'Verify (full)'

on:
  pull_request:
    paths:
      - 'client/**'
      - '.github/workflows/verify-full.yml'
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: verify-full-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.41.7'

jobs:
  client-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter analyze
      - run: flutter test --no-pub

  client-android:
    needs: client-test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('client/android/**/*.gradle*', 'client/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build apk --debug
      - uses: actions/upload-artifact@v4
        with:
          name: cestovni-debug-apk
          path: client/build/app/outputs/flutter-apk/app-debug.apk

  client-ios:
    needs: client-test
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: macos-14
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build ios --debug --no-codesign
