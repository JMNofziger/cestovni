# Steps remain TODO until the runner is wired; placeholders exit 0 today.

name: rls-regression

on:
  workflow_call:

  pull_request:
    paths:
      - 'migrations/**'
      - 'tests/rls/**'
      - '.github/workflows/rls-regression.yml'

